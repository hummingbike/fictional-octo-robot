name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        if: matrix.os == 'ubuntu-latest'
        with:
          python-version: "3.12"

      - name: Set up Python via Homebrew (macOS)
        # actions/setup-python's macOS builds link against a libsqlite3 with
        # loadable extensions disabled, so sqlite3.Connection.enable_load_extension
        # doesn't exist -- breaking sqlite-vec (semantic search, F6). Homebrew's
        # python3 links against Homebrew's own libsqlite3, which has it enabled.
        # Homebrew's Python is PEP 668 "externally managed", so create a venv
        # and put it on PATH instead of pip-installing into it directly.
        if: matrix.os == 'macos-latest'
        run: |
          brew install python@3.12
          /opt/homebrew/opt/python@3.12/libexec/bin/python3 -m venv "$RUNNER_TEMP/venv"
          echo "$RUNNER_TEMP/venv/bin" >> "$GITHUB_PATH"

      - name: Install ripgrep (for the fts5-vs-ripgrep benchmark test)
        run: |
          if [ "${{ matrix.os }}" = "macos-latest" ]; then
            brew install ripgrep
          else
            sudo apt-get update && sudo apt-get install -y ripgrep
          fi

      - name: Install project
        run: pip install -e ".[dev]"

      - name: Run tests
        run: python -m pytest -v
